kind = "web"
previewPath = "/"
title = "Jabeen Jewels"
version = "1.0.0"
id = "artifacts/jabeen-jewels"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23515

[services.development]
run = "pnpm --filter @workspace/jabeen-jewels run dev"

[services.production]
serve = "static"
publicDir = "artifacts/jabeen-jewels/dist/public"

[services.production.build]
args = ["pnpm", "--filter", "@workspace/jabeen-jewels", "run", "build"]

[services.production.build.env]
PORT = "3000"
BASE_PATH = "/"
NODE_ENV = "production"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23515"
BASE_PATH = "/"
